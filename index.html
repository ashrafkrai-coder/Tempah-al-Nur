<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempahan Surau al-Nur</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="16x16" href="./icons/app-icon-32.png">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/app-icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/app-icon-192.png">
<link rel="shortcut icon" href="./icons/app-icon-32.png">
<link rel="apple-touch-icon" sizes="192x192" href="./icons/app-icon-192.png">
<meta name="theme-color" content="#2e7d32">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg: #f6f3ee;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --line: #e6e1d9;
    --brand: #1f6b4f;
    --brand-dark: #16513c;
    --booked: #d95f5f;
    --available: #2f8f68;
    --shadow: 0 14px 36px rgba(21, 32, 24, 0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "DM Sans", sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 10% 0%, #f0ebe2 0%, transparent 45%),
      radial-gradient(circle at 95% 15%, #ece8e0 0%, transparent 35%),
      var(--bg);
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
  }

  .page {
    width: 100%;
    max-width: 1040px;
    margin: 0 auto;
  }

  .hero {
    text-align: center;
    margin-bottom: 1.25rem;
  }

  .hero h1 {
    margin: 0;
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(2rem, 4vw, 3rem);
    letter-spacing: 0.02em;
    color: #163b2d;
  }

  .hero p {
    margin: 0.25rem 0 0;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .layout {
    display: grid;
    gap: 1.1rem;
    grid-template-columns: 1.2fr 1fr;
    align-items: start;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 1rem;
    box-shadow: var(--shadow);
    padding: 1.25rem;
  }

  .card h2 {
    margin: 0 0 0.85rem;
    font-size: 1.05rem;
    font-weight: 700;
    color: #213229;
  }

  .form-grid {
    display: grid;
    gap: 0.7rem;
  }

  .input,
  .select {
    width: 100%;
    border: 1px solid #d9d3c8;
    border-radius: 0.7rem;
    padding: 0.7rem 0.85rem;
    font-size: 1rem;
    color: #2f3a34;
    background: #fff;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }

  .input:focus,
  .select:focus {
    outline: none;
    border-color: #9fb9ad;
    box-shadow: 0 0 0 3px rgba(31, 107, 79, 0.12);
  }

  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.7rem;
  }

  .btn-primary {
    width: 100%;
    border: 0;
    border-radius: 0.75rem;
    padding: 0.78rem 1rem;
    background: linear-gradient(135deg, var(--brand), var(--brand-dark));
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: transform 120ms ease, opacity 120ms ease;
  }

  .btn-primary:hover { transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); opacity: 0.95; }

  #calendar {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 0.55rem;
    margin-bottom: 1.5rem;
  }

  .calendar-day {
    border-radius: 0.7rem;
    padding: 0.6rem 0.35rem;
    text-align: center;
    font-size: 0.86rem;
    font-weight: 600;
    border: 1px solid transparent;
    cursor: pointer;
    user-select: none;
    transition: all 0.2s;
  }

  .calendar-day:hover { transform: scale(1.05); }

  .booked {
    background-color: #f8e0e0;
    color: #8e2d2d;
    border-color: #efc7c7;
  }

  .available {
    background-color: #e3f3ec;
    color: #1f6b4f;
    border-color: #cde7dc;
  }

  .booking-card {
    border: 1px solid var(--line);
    border-radius: 0.8rem;
    padding: 0.85rem;
    background: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.6rem;
    transition: border-color 0.2s;
  }
  
  .booking-card:hover { border-color: var(--brand); }

  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<main class="page">
  <header class="hero">
    <h1>Tempahan Surau al-Nur</h1>
    <p>Sistem tempahan ringkas, kemas dan teratur</p>
  </header>

  <section class="layout">
    <article class="card">
      <h2>Borang Tempahan Baru</h2>
      <form id="bookingForm" class="form-grid">
        <input type="text" id="nama" placeholder="Nama Penuh" required class="input">
        <input type="text" id="unit" placeholder="Kelas / Unit" required class="input">
        <input type="date" id="tarikh" required class="input">
        <div class="row-2">
          <select id="jamDari" required class="select"></select>
          <select id="jamHingga" required class="select"></select>
        </div>
        <input type="text" id="tujuan" placeholder="Tujuan Aktiviti" required class="input">
        <input type="email" id="email" placeholder="Emel (untuk notifikasi)" required class="input">
        <button type="submit" class="btn-primary" id="submitBtn">Hantar Tempahan</button>
      </form>
    </article>

    <article class="card">
      <div class="flex justify-between items-center mb-4">
        <h2 class="!mb-0">Status Slot</h2>
        <span class="text-[10px] uppercase font-bold text-stone-400 tracking-widest">2 Minggu Terdekat</span>
      </div>
      
      <div id="calendar"></div>

      <div class="border-t border-stone-100 pt-4">
        <h3 class="text-xs font-bold text-stone-500 uppercase tracking-widest mb-3">Senarai Tempahan</h3>
        <div id="bookingList" class="max-h-[400px] overflow-y-auto pr-1">
          <p class="text-sm text-gray-400 italic">Memuatkan data...</p>
        </div>
      </div>
    </article>
  </section>
</main>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxLFxmvUNt3js9Mdi0XfxoXIDQujQ5zpOE1CClZR6XL5gnlBtXm-g8-NEo3TUn-GnAv/exec";

// 1. Bina pilihan masa
function binaPilihanMasa() {
  const jamDari = document.getElementById('jamDari');
  const jamHingga = document.getElementById('jamHingga');
  let times = [];
  for (let totalMin = 450; totalMin <= 1350; totalMin += 30) {
    const h = String(Math.floor(totalMin/60)).padStart(2,'0');
    const m = String(totalMin%60).padStart(2,'0');
    times.push(`${h}:${m}`);
  }
  const options = times.map(t=>`<option value="${t}">${t}</option>`).join('');
  jamDari.innerHTML = options;
  jamHingga.innerHTML = options;
  jamDari.value = "07:30";
  jamHingga.value = "08:30";
}
binaPilihanMasa();

let bookings = [];

// Helper Tarikh
function formatDateLocal(dateObj){
  const y = dateObj.getFullYear();
  const m = String(dateObj.getMonth()+1).padStart(2,'0');
  const d = String(dateObj.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function normalizeBookingDate(rawDate){
  if (!rawDate) return "";
  if (/^\d{4}-\d{2}-\d{2}$/.test(rawDate)) return rawDate;
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(rawDate)) {
    const [d, m, y] = rawDate.split('/');
    return `${y}-${m}-${d}`;
  }
  const dt = new Date(rawDate);
  return !Number.isNaN(dt.getTime()) ? formatDateLocal(dt) : String(rawDate);
}

function timeToMinutes(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  return (h * 60) + m;
}

function parseSlotRange(slotRaw) {
  const match = String(slotRaw).match(/(\d{2}:\d{2})\s*-\s*(\d{2}:\d{2})/);
  if (!match) return null;
  return { startMin: timeToMinutes(match[1]), endMin: timeToMinutes(match[2]) };
}

function isDateTimeConflict(dateYmd, startTime, endTime) {
  const sStart = timeToMinutes(startTime);
  const sEnd = timeToMinutes(endTime);
  return bookings.some(b => {
    if (normalizeBookingDate(b.tarikh) !== dateYmd) return false;
    const slot = parseSlotRange(b.slot);
    if (!slot) return false;
    return sStart < slot.endMin && slot.startMin < sEnd;
  });
}

// 2. Fetch & Render
async function fetchBookings() {
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    bookings = Array.isArray(data) ? data : [];
    renderUI();
  } catch(e) {
    console.error("Gagal fetch data", e);
    renderUI();
  }
}

function renderUI() {
  const calDiv = document.getElementById('calendar');
  const listDiv = document.getElementById('bookingList');
  calDiv.innerHTML = "";
  listDiv.innerHTML = "";

  const today = new Date();
  const jamDari = document.getElementById('jamDari').value;
  const jamHingga = document.getElementById('jamHingga').value;

  // A. Render Kalendar
  for(let i=0; i<14; i++){
    const d = new Date(today.getFullYear(), today.getMonth(), today.getDate()+i);
    const dStr = formatDateLocal(d);
    const dayDiv = document.createElement('div');
    dayDiv.className = "calendar-day";
    dayDiv.innerHTML = `<div class="text-[10px] opacity-60 uppercase">${d.toLocaleDateString('ms-MY', {weekday:'short'})}</div>${d.getDate()}/${d.getMonth()+1}`;
    
    const hasBooking = isDateTimeConflict(dStr, jamDari, jamHingga);
    dayDiv.classList.add(hasBooking ? "booked" : "available");
    
    dayDiv.onclick = () => {
      document.getElementById('tarikh').value = dStr;
      validateSelectedDateAvailability();
      document.getElementById('nama').focus();
    };
    calDiv.appendChild(dayDiv);
  }

  // B. Render Senarai Kad
  const upcoming = bookings
    .filter(b => new Date(normalizeBookingDate(b.tarikh)) >= new Date(today.setHours(0,0,0,0)))
    .sort((a,b) => new Date(normalizeBookingDate(a.tarikh)) - new Date(normalizeBookingDate(b.tarikh)));

  if (upcoming.length === 0) {
    listDiv.innerHTML = `<p class="text-sm text-gray-400 italic">Tiada tempahan aktif.</p>`;
  } else {
    upcoming.forEach(b => {
      const card = document.createElement('div');
      card.className = "booking-card";
      card.innerHTML = `
        <div class="flex-1">
          <div class="text-[10px] font-bold text-green-700 uppercase">${b.tarikh}</div>
          <div class="text-sm font-bold text-gray-800 leading-tight">${b.tujuan}</div>
          <div class="text-[11px] text-gray-500">${b.nama} • ${b.unit}</div>
        </div>
        <div class="ml-2">
          <span class="bg-stone-100 text-stone-600 text-[10px] px-2 py-1 rounded font-bold">${b.slot}</span>
        </div>
      `;
      listDiv.appendChild(card);
    });
  }
}

// 3. Validasi & Submit
function validateSelectedDateAvailability() {
  const tarikhInput = document.getElementById('tarikh');
  const jamDari = document.getElementById('jamDari').value;
  const jamHingga = document.getElementById('jamHingga').value;
  
  if (tarikhInput.value && isDateTimeConflict(tarikhInput.value, jamDari, jamHingga)) {
    tarikhInput.setCustomValidity("Masa ini telah ditempah.");
    return false;
  }
  tarikhInput.setCustomValidity("");
  return true;
}

document.getElementById('bookingForm').addEventListener('submit', async e => {
  e.preventDefault();
  const submitBtn = document.getElementById('submitBtn');
  const jamDari = document.getElementById('jamDari').value;
  const jamHingga = document.getElementById('jamHingga').value;

  if(jamHingga <= jamDari){ alert("Waktu tamat mestilah selepas waktu mula."); return; }
  if(!validateSelectedDateAvailability()){ alert("Maaf, slot ini telah diambil."); return; }

  submitBtn.disabled = true;
  submitBtn.innerText = "Menghantar...";

  const payload = {
    nama: document.getElementById('nama').value,
    unit: document.getElementById('unit').value,
    tarikh: document.getElementById('tarikh').value.split('-').reverse().join('/'),
    slot: `${jamDari} - ${jamHingga}`,
    tujuan: document.getElementById('tujuan').value,
    email: document.getElementById('email').value
  };

  try {
    const res = await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify(payload) });
    const data = await res.json();
    if(data.result === "error") throw new Error(data.message);
    alert("Tempahan Berjaya!");
    document.getElementById('bookingForm').reset();
    fetchBookings();
  } catch(err) {
    alert("Ralat: " + err.message);
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerText = "Hantar Tempahan";
  }
});

// Event Listeners untuk kemas kini UI
['jamDari', 'jamHingga'].forEach(id => {
  document.getElementById(id).addEventListener('change', renderUI);
});
document.getElementById('tarikh').addEventListener('change', validateSelectedDateAvailability);

// Start
fetchBookings();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js?v=12');
  });
}
</script>
</body>
</html>
